<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Week FTP Training Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #FC6C3F 0%, #FF8E53 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.95;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            color: #667eea;
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-unit {
            color: #999;
            font-size: 0.8em;
        }
        
        .content {
            padding: 40px;
        }
        
        .ftp-section {
            background: #e3f2fd;
            border-left: 5px solid #2196F3;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .ftp-section h3 {
            color: #1976D2;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .ftp-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
        }
        
        .input-group label {
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .input-group input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .week-block {
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }
        
        .week-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .week-header:hover {
            opacity: 0.9;
        }
        
        .week-header.deload {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
        }
        
        .week-header.test {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }
        
        .week-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .week-title h3 {
            font-size: 1.3em;
        }
        
        .week-badge {
            background: rgba(255,255,255,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .week-progress {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-text {
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .workout-grid {
            padding: 20px;
            display: grid;
            gap: 15px;
        }
        
        .workout-row {
            display: grid;
            grid-template-columns: 100px 1fr 120px 150px;
            gap: 15px;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .workout-row:hover {
            background: #e9ecef;
        }
        
        .workout-row.completed {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }
        
        .day-label {
            font-weight: 700;
            color: #667eea;
            font-size: 1em;
        }
        
        .workout-name {
            color: #333;
            font-size: 0.95em;
        }
        
        .workout-details {
            color: #666;
            font-size: 0.85em;
            margin-top: 3px;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .notes-input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9em;
            width: 100%;
        }
        
        .notes-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
        }
        
        .actions {
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
        }
        
        .progress-bar-container {
            background: #e9ecef;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .hidden {
            display: none;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .btn, .actions {
                display: none;
            }
            
            .container {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚴‍♂️ 12-Week FTP Training Tracker</h1>
            <p>Track your progress, log workouts, and crush your goals!</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Workouts Completed</div>
                <div class="stat-value"><span id="completedCount">0</span><span class="stat-unit">/60</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Current Week</div>
                <div class="stat-value" id="currentWeek">1</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Completion Rate</div>
                <div class="stat-value"><span id="completionRate">0</span><span class="stat-unit">%</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">FTP Gain</div>
                <div class="stat-value"><span id="ftpGain">--</span><span class="stat-unit">W</span></div>
            </div>
        </div>
        
        <div class="content">
            <div class="ftp-section">
                <h3>📊 FTP Tracking</h3>
                <p style="color: #666; margin-bottom: 15px;">Track your Functional Threshold Power throughout the program</p>
                <div class="ftp-inputs">
                    <div class="input-group">
                        <label>Starting FTP (Week 1)</label>
                        <input type="number" id="startFTP" placeholder="e.g., 250" oninput="updateFTPStats()">
                    </div>
                    <div class="input-group">
                        <label>Week 4 FTP Test Result</label>
                        <input type="number" id="week4FTP" placeholder="e.g., 260" oninput="updateFTPStats()">
                    </div>
                    <div class="input-group">
                        <label>Week 12 FTP Test Result</label>
                        <input type="number" id="week12FTP" placeholder="e.g., 270" oninput="updateFTPStats()">
                    </div>
                </div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="overallProgress" style="width: 0%"></div>
            </div>
            
            <div id="weeksContainer"></div>
        </div>
        
        <div class="actions">
            <button class="btn" onclick="saveProgress()">💾 Save Progress</button>
            <button class="btn btn-secondary" onclick="resetProgress()">🔄 Reset All</button>
            <button class="btn btn-secondary" onclick="window.print()">🖨️ Print Tracker</button>
            <button class="btn btn-secondary" onclick="exportToCSV()">📥 Export to CSV</button>
        </div>
    </div>

                    { day: "Wednesday", name: "🏆 FINAL FTP TEST", details: "20 min all-out + celebrate gains!" },

                ]

        ];

        let workoutData = {};

        function initializeTracker() {
            loadProgress();
            renderWeeks();
            updateStats();
        }

        function renderWeeks() {
            const container = document.getElementById('weeksContainer');
            container.innerHTML = '';

            trainingPlan.forEach((week, weekIndex) => {
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week-block';
                weekDiv.innerHTML = `
                    <div class="week-header ${week.type}" onclick="toggleWeek(${weekIndex})">
                        <div class="week-title">
                            <h3>Week ${week.week}</h3>
                            <span class="week-badge">${week.type.toUpperCase()}</span>
                        </div>
                        <div class="week-progress">
                            <span class="progress-text" id="weekProgress${weekIndex}">0/5</span>
                        </div>
                    </div>
                    <div class="workout-grid" id="week${weekIndex}">
                        ${week.workouts.map((workout, workoutIndex) => {
                            const workoutId = `w${weekIndex}_d${workoutIndex}`;
                            const isCompleted = workoutData[workoutId]?.completed || false;
                            const notes = workoutData[workoutId]?.notes || '';
                            
                            return `
                                <div class="workout-row ${isCompleted ? 'completed' : ''}">
                                    <div class="day-label">${workout.day}</div>
                                    <div>
                                        <div class="workout-name">${workout.name}</div>
                                        <div class="workout-details">${workout.details}</div>
                                    </div>
                                    <div class="checkbox-container">
                                        <input type="checkbox" class="checkbox" 
                                               id="${workoutId}" 
                                               ${isCompleted ? 'checked' : ''}
                                               onchange="toggleWorkout('${workoutId}', ${weekIndex})">
                                    </div>
                                    <input type="text" class="notes-input" 
                                           placeholder="Notes..." 
                                           value="${notes}"
                                           onchange="updateNotes('${workoutId}', this.value)">
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(weekDiv);
                updateWeekProgress(weekIndex);
            });
        }

        function toggleWeek(weekIndex) {
            const weekContent = document.getElementById(`week${weekIndex}`);
            weekContent.classList.toggle('hidden');
        }

        function toggleWorkout(workoutId, weekIndex) {
            const checkbox = document.getElementById(workoutId);
            
            if (!workoutData[workoutId]) {
                workoutData[workoutId] = { completed: false, notes: '' };
            }
            
            workoutData[workoutId].completed = checkbox.checked;
            
            const row = checkbox.closest('.workout-row');
            if (checkbox.checked) {
                row.classList.add('completed');
            } else {
                row.classList.remove('completed');
            }
            
            updateWeekProgress(weekIndex);
            updateStats();
            saveProgress();
        }

        function updateNotes(workoutId, notes) {
            if (!workoutData[workoutId]) {
                workoutData[workoutId] = { completed: false, notes: '' };
            }
            workoutData[workoutId].notes = notes;
            saveProgress();
        }

        function updateWeekProgress(weekIndex) {
            const week = trainingPlan[weekIndex];
            let completed = 0;
            
            week.workouts.forEach((_, workoutIndex) => {
                const workoutId = `w${weekIndex}_d${workoutIndex}`;
                if (workoutData[workoutId]?.completed) {
                    completed++;
                }
            });
            
            const progressEl = document.getElementById(`weekProgress${weekIndex}`);
            if (progressEl) {
                progressEl.textContent = `${completed}/${week.workouts.length}`;
            }
        }

        function updateStats() {
            let totalCompleted = 0;
            let totalWorkouts = 0;
            let currentWeek = 1;
            
            trainingPlan.forEach((week, weekIndex) => {
                let weekCompleted = 0;
                week.workouts.forEach((_, workoutIndex) => {
                    totalWorkouts++;
                    const workoutId = `w${weekIndex}_d${workoutIndex}`;
                    if (workoutData[workoutId]?.completed) {
                        totalCompleted++;
                        weekCompleted++;
                    }
                });
                
                if (weekCompleted > 0 && weekCompleted < week.workouts.length) {
                    currentWeek = week.week;
                } else if (weekCompleted === week.workouts.length && week.week < 12) {
                    currentWeek = week.week + 1;
                }
            });
            
            document.getElementById('completedCount').textContent = totalCompleted;
            document.getElementById('currentWeek').textContent = currentWeek;
            document.getElementById('completionRate').textContent = 
                Math.round((totalCompleted / totalWorkouts) * 100);
            
            const progressBar = document.getElementById('overallProgress');
            progressBar.style.width = `${(totalCompleted / totalWorkouts) * 100}%`;
        }

        function updateFTPStats() {
            const startFTP = parseFloat(document.getElementById('startFTP').value) || 0;
            const week12FTP = parseFloat(document.getElementById('week12FTP').value) || 0;
            
            if (startFTP && week12FTP) {
                const gain = week12FTP - startFTP;
                document.getElementById('ftpGain').textContent = `+${gain}`;
            } else {
                document.getElementById('ftpGain').textContent = '--';
            }
            
            saveProgress();
        }

        function saveProgress() {
            const data = {
                workouts: workoutData,
                startFTP: document.getElementById('startFTP').value,
                week4FTP: document.getElementById('week4FTP').value,
                week12FTP: document.getElementById('week12FTP').value
            };
            
            // Save to Firebase
            const progressRef = ref(database, 'fincktri/trainingProgress');
            set(progressRef, data)
                .then(() => {
                    console.log('Progress saved to Firebase successfully');
                })
                .catch((error) => {
                    console.error('Error saving to Firebase:', error);
                    // Fallback to localStorage if Firebase fails
                    localStorage.setItem('ftpTrainingProgress', JSON.stringify(data));
                });
        }

        function loadProgress() {
            // Load from Firebase
            const progressRef = ref(database, 'fincktri/trainingProgress');
            get(progressRef)
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        workoutData = data.workouts || {};
                        document.getElementById('startFTP').value = data.startFTP || '';
                        document.getElementById('week4FTP').value = data.week4FTP || '';
                        document.getElementById('week12FTP').value = data.week12FTP || '';
                        updateFTPStats();
                        console.log('Progress loaded from Firebase successfully');
                    } else {
                        // Try to load from localStorage as fallback
                        const saved = localStorage.getItem('ftpTrainingProgress');
                        if (saved) {
                            const data = JSON.parse(saved);
                            workoutData = data.workouts || {};
                            document.getElementById('startFTP').value = data.startFTP || '';
                            document.getElementById('week4FTP').value = data.week4FTP || '';
                            document.getElementById('week12FTP').value = data.week12FTP || '';
                            updateFTPStats();
                            // Save to Firebase for future use
                            saveProgress();
                            console.log('Progress loaded from localStorage and migrated to Firebase');
                        }
                    }
                })
                .catch((error) => {
                    console.error('Error loading from Firebase:', error);
                    // Fallback to localStorage if Firebase fails
                    const saved = localStorage.getItem('ftpTrainingProgress');
                    if (saved) {
                        const data = JSON.parse(saved);
                        workoutData = data.workouts || {};
                        document.getElementById('startFTP').value = data.startFTP || '';
                        document.getElementById('week4FTP').value = data.week4FTP || '';
                        document.getElementById('week12FTP').value = data.week12FTP || '';
                        updateFTPStats();
                    }
                });
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                // Clear Firebase data
                const progressRef = ref(database, 'fincktri/trainingProgress');
                set(progressRef, null)
                    .then(() => {
                        console.log('Progress cleared from Firebase successfully');
                    })
                    .catch((error) => {
                        console.error('Error clearing Firebase data:', error);
                    });
                
                // Also clear localStorage
                localStorage.removeItem('ftpTrainingProgress');
                
                workoutData = {};
                document.getElementById('startFTP').value = '';
                document.getElementById('week4FTP').value = '';
                document.getElementById('week12FTP').value = '';
                renderWeeks();
                updateStats();
            }
        }
        
        // Make functions available globally
        window.saveProgress = saveProgress;
        window.resetProgress = resetProgress;
        window.exportToCSV = exportToCSV;

        function exportToCSV() {
            let csv = 'Week,Day,Workout,Details,Completed,Notes\n';
            
            trainingPlan.forEach((week, weekIndex) => {
                week.workouts.forEach((workout, workoutIndex) => {
                    const workoutId = `w${weekIndex}_d${workoutIndex}`;
                    const completed = workoutData[workoutId]?.completed ? 'Yes' : 'No';
                    const notes = workoutData[workoutId]?.notes || '';
                    csv += `${week.week},${workout.day},"${workout.name}","${workout.details}",${completed},"${notes}"\n`;
                });
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '12-week-ftp-training-log.csv';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
        
        // Make more functions globally available for inline event handlers
        window.updateFTPStats = updateFTPStats;
        window.toggleWeek = toggleWeek;
        window.toggleWorkout = toggleWorkout;
        window.updateNotes = updateNotes;

        initializeTracker();
    </script>
</body>
</html>
